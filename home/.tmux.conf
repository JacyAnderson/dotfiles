# ~/.tmux.conf — beginner-friendly starter
# Prefix is Ctrl-b: press Ctrl-b, RELEASE, then the command key. (e.g. "new window" = Ctrl-b then c)

# --- Quality of life ---
set -g mouse on                             # click panes/windows to select; drag borders to resize
set -g history-limit 50000                  # deep scrollback for reading agent output
set -sg escape-time 10                      # snappier key response (helps TUIs like Claude Code)
set -g default-terminal "screen-256color"   # correct colors inside tmux

# --- Sane numbering ---
set -g base-index 1                         # windows start at 1 (matches the number keys)
setw -g pane-base-index 1                   # panes start at 1 too
set -g renumber-windows on                  # keep window numbers tidy after you close one
set -g allow-rename off                      # don't let programs (Claude Code) rename my windows
set -g automatic-rename off                  # keep the names I give windows

# --- Fleet: flag a window in the status bar when a team wants attention ---
set -g monitor-bell on                       # highlight a window when its program rings the bell
set -g visual-bell on                        # show bells as a silent status flash, not an audible beep
setw -g monitor-silence 30                   # highlight a window that's gone quiet 30s (likely waiting on you / done)

# --- Easier splits (mnemonic: | divides vertically, - divides horizontally) ---
bind | split-window -h -c "#{pane_current_path}"   # side-by-side, opens in same dir
bind - split-window -v -c "#{pane_current_path}"   # stacked, opens in same dir
unbind '"'
unbind %

# --- Reload this config live: prefix then r ---
bind r source-file ~/.tmux.conf \; display "tmux config reloaded"
